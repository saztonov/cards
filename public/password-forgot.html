<!doctype html>
<html lang="ru" data-default-theme="modern">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Восстановление пароля</title>
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/themes/modern.css">
  <link rel="stylesheet" href="/css/themes/legacy.css">
  <link rel="stylesheet" href="/css/app.css">
  <script src="/config.js" onerror="this.remove()"></script>
</head>
<body>
  <main class="page" style="justify-content:center;">
    <form id="form" class="card card--narrow body--lg stack">
      <h1 class="header__title" style="color:var(--c-text);">Восстановление пароля</h1>
      <p class="muted">Введите email — придёт ссылка для сброса.</p>

      <div>
        <label class="label" for="email">Email</label>
        <input id="email" class="field" type="email" required autocomplete="email">
      </div>

      <p id="done" class="muted" hidden>Если аккаунт существует, ссылка отправлена.</p>
      <button type="submit" class="btn btn--primary btn--block">Отправить</button>
      <p class="muted center" style="font-size:var(--text-sm);"><a href="/login.html">← Назад ко входу</a></p>
    </form>
  </main>

  <script type="module">
    import { initTheme } from '/js/theme.js';
    import { apiJson } from '/js/api.js';
    import { $ } from '/js/lib/escape.js';

    initTheme();

    $('#form').addEventListener('submit', async (e) => {
      e.preventDefault();
      await apiJson('/api/v1/auth/password/forgot', {
        method: 'POST',
        body: { email: $('#email').value },
      }).catch(() => {});
      $('#done').hidden = false;
      $('#form').querySelector('button').disabled = true;
    });
  </script>
</body>
</html>
