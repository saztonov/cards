<!doctype html>
<html lang="ru" data-default-theme="modern">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Сброс пароля</title>
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/themes/modern.css">
  <link rel="stylesheet" href="/css/themes/legacy.css">
  <link rel="stylesheet" href="/css/app.css">
  <script src="/config.js" onerror="this.remove()"></script>
</head>
<body>
  <main class="page" style="justify-content:center;">
    <form id="form" class="card card--narrow body--lg stack">
      <h1 class="header__title" style="color:var(--c-text);">Новый пароль</h1>

      <div>
        <label class="label" for="password">Пароль (минимум 6 символов)</label>
        <input id="password" class="field" type="password" required minlength="6" autocomplete="new-password">
      </div>

      <p id="done" class="muted" hidden>Пароль изменён. <a href="/login.html">Войти</a></p>
      <p id="error" class="muted" hidden style="color:#c0392b;"></p>

      <button type="submit" class="btn btn--primary btn--block">Сохранить</button>
    </form>
  </main>

  <script type="module">
    import { initTheme } from '/js/theme.js';
    import { apiJson } from '/js/api.js';
    import { setText, $ } from '/js/lib/escape.js';

    initTheme();

    const token = new URLSearchParams(location.search).get('token');
    if (!token) { $('#error').hidden = false; setText($('#error'), 'Неверная ссылка.'); }

    $('#form').addEventListener('submit', async (e) => {
      e.preventDefault();
      $('#error').hidden = true;
      try {
        await apiJson('/api/v1/auth/password/reset', {
          method: 'POST',
          body: { token, password: $('#password').value },
        });
        $('#done').hidden = false;
        $('#form').querySelector('button').disabled = true;
      } catch (ex) {
        const err = $('#error');
        err.hidden = false;
        setText(err, ex.message === 'invalid_or_expired' ? 'Ссылка недействительна или устарела.' : 'Не удалось сохранить.');
      }
    });
  </script>
</body>
</html>
