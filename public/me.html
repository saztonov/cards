<!doctype html>
<html lang="ru" data-default-theme="modern">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Моя визитка · СУ-10</title>
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/themes/modern.css">
  <link rel="stylesheet" href="/css/themes/legacy.css">
  <link rel="stylesheet" href="/css/app.css">
  <script src="/theme-default.js" onerror="this.remove()"></script>
</head>
<body>
  <main class="page">
    <section class="card card--wide">
      <div class="header">
        <div class="header__title">Моя визитка</div>
        <div style="display:flex; gap:.5rem;">
          <a id="adminLink" class="btn btn--soft" href="/admin.html" hidden>Администрирование</a>
          <a id="publicLink" class="btn btn--soft" target="_blank">Открыть</a>
          <button id="logout" class="btn btn--ghost" type="button">Выйти</button>
        </div>
      </div>

      <div class="body body--lg">
        <form id="profileForm" class="stack">
          <div style="display:flex; gap:1rem; align-items:center;">
            <img id="avatarPreview" class="row__avatar" alt="" style="width:4.5rem; height:4.5rem;">
            <div style="flex:1;">
              <label class="label">Фото (до 5 МБ)</label>
              <input id="avatarInput" type="file" accept="image/*">
            </div>
          </div>

          <div>
            <label class="label" for="full_name">ФИО</label>
            <input id="full_name" class="field" required maxlength="120">
          </div>
          <div>
            <label class="label" for="position">Должность</label>
            <input id="position" class="field" maxlength="120">
          </div>
          <div>
            <label class="label" for="phone">Телефон</label>
            <input id="phone" class="field" maxlength="40">
          </div>
          <div>
            <label class="label" for="telegram">Telegram (без @)</label>
            <input id="telegram" class="field" maxlength="60">
          </div>
          <div>
            <label class="label" for="about">О себе</label>
            <textarea id="about" class="field" rows="3" maxlength="500"></textarea>
          </div>

          <p id="status" class="muted" hidden></p>
          <button type="submit" class="btn btn--primary">Сохранить</button>
        </form>
      </div>
    </section>

    <div class="theme-switch">
      Тема: <button type="button" data-theme-action="modern">современная</button>
      · <button type="button" data-theme-action="legacy">классическая</button>
    </div>
  </main>

  <script type="module">
    import { initTheme, setTheme } from '/js/theme.js';
    import { apiJson, hasToken, clearToken } from '/js/api.js';
    import { setText, setAttr, $, $$ } from '/js/lib/escape.js';

    initTheme();
    for (const btn of $$('[data-theme-action]')) {
      btn.addEventListener('click', () => setTheme(btn.dataset.themeAction));
    }

    if (!hasToken()) { location.replace('/login.html'); throw new Error('unauth'); }

    let me;
    try {
      me = await apiJson('/api/v1/me');
    } catch (ex) {
      if (ex.status === 401) { clearToken(); location.replace('/login.html'); }
      throw ex;
    }
    setAttr($('#publicLink'), 'href', `/c.html?slug=${encodeURIComponent(me.slug)}`);
    if (me.role === 'admin') $('#adminLink').hidden = false;
    for (const f of ['full_name', 'position', 'phone', 'telegram', 'about']) {
      $(`#${f}`).value = me[f] || '';
    }
    if (me.avatar_path) setAttr($('#avatarPreview'), 'src', me.avatar_path);

    $('#profileForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const status = $('#status');
      status.hidden = false; setText(status, 'Сохраняем…');
      const body = {};
      for (const f of ['full_name', 'position', 'phone', 'telegram', 'about']) body[f] = $(`#${f}`).value;
      try {
        await apiJson('/api/v1/me', { method: 'PUT', body });
        const file = $('#avatarInput').files[0];
        if (file) {
          const fd = new FormData();
          fd.append('avatar', file);
          const r = await apiJson('/api/v1/me/avatar', { method: 'POST', formData: fd });
          setAttr($('#avatarPreview'), 'src', r.avatar_path);
        }
        setText(status, 'Сохранено.');
      } catch {
        setText(status, 'Не удалось сохранить.');
      }
    });

    $('#logout').addEventListener('click', () => {
      clearToken();
      location.replace('/');
    });
  </script>
</body>
</html>
