<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Администрирование · СУ-10</title>
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <main class="page">
    <section class="card card--wide">
      <div class="header">
        <div class="header__title">Администрирование</div>
        <div style="display:flex; gap:.5rem;">
          <a class="btn btn--soft btn--icon" href="/me.html" aria-label="Моя визитка" title="Моя визитка">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </a>
        </div>
      </div>

      <div class="body body--lg">
        <h2 style="font-size:var(--text-lg); margin-bottom:var(--space-2);">Ожидают подтверждения</h2>
        <div id="pending" class="stack"></div>

        <h2 style="font-size:var(--text-lg); margin-top:var(--space-8); margin-bottom:var(--space-2);">Активные пользователи</h2>
        <div id="active" class="stack"></div>

        <div style="display:flex; justify-content:flex-end; margin-top:var(--space-6);">
          <button id="logout" class="btn btn--ghost" type="button">Выйти</button>
        </div>
      </div>
    </section>

  </main>

  <script type="module">
    import { apiJson, api, hasToken, clearToken } from '/js/api.js';
    import { setText, $, clear } from '/js/lib/escape.js';

    if (!hasToken()) { location.replace('/login.html'); throw new Error('unauth'); }

    $('#logout').addEventListener('click', () => {
      clearToken();
      location.replace('/');
    });

    async function loadUsers() {
      let users;
      try {
        users = await apiJson('/api/v1/admin/users');
      } catch (ex) {
        if (ex.status === 403) { location.replace('/me.html'); throw ex; }
        if (ex.status === 401) { clearToken(); location.replace('/login.html'); throw ex; }
        throw ex;
      }
      render(users);
    }

    function render(users) {
      const pending = users.filter((u) => !u.is_active);
      const active = users.filter((u) => u.is_active);
      renderList($('#pending'), pending, 'Нет новых заявок.');
      renderList($('#active'),  active,  'Активных пользователей пока нет.');
    }

    function renderList(box, list, emptyText) {
      clear(box);
      if (!list.length) {
        const p = document.createElement('p');
        p.className = 'muted';
        setText(p, emptyText);
        box.appendChild(p);
        return;
      }
      for (const u of list) {
        box.appendChild(renderRow(u));
      }
    }

    const ICONS = {
      check: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>',
      pause: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>',
      trash: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>',
    };

    function renderRow(u) {
      const row = document.createElement('div');
      row.className = 'row';
      const info = document.createElement('div');
      info.style.flex = '1';
      info.style.minWidth = '0';
      const top = document.createElement('div');
      top.className = 'row__name';
      setText(top, u.full_name || u.email);
      const sub = document.createElement('div');
      sub.className = 'row__role';
      const when = new Date(u.created_at).toLocaleString('ru-RU');
      const roleMark = u.role === 'admin' ? ' · admin' : '';
      setText(sub, `${u.email} · ${when}${roleMark}`);
      info.append(top, sub);

      const actions = document.createElement('div');
      actions.style.display = 'flex';
      actions.style.gap = '.5rem';
      actions.style.flex = '0 0 auto';

      if (!u.is_active) {
        actions.appendChild(iconButton(ICONS.check, 'Активировать', 'btn btn--primary btn--icon', async () => {
          await api(`/api/v1/admin/users/${u.id}/activate`, { method: 'POST' });
          await loadUsers();
        }));
      } else {
        actions.appendChild(iconButton(ICONS.pause, 'Деактивировать', 'btn btn--ghost btn--icon', async () => {
          await api(`/api/v1/admin/users/${u.id}/deactivate`, { method: 'POST' });
          await loadUsers();
        }));
      }
      actions.appendChild(iconButton(ICONS.trash, 'Удалить', 'btn btn--ghost btn--icon', async () => {
        if (!confirm(`Удалить ${u.email}?`)) return;
        await api(`/api/v1/admin/users/${u.id}`, { method: 'DELETE' });
        await loadUsers();
      }));

      row.append(info, actions);
      return row;
    }

    function iconButton(svg, label, className, onClick) {
      const b = document.createElement('button');
      b.type = 'button';
      b.className = className;
      b.setAttribute('aria-label', label);
      b.setAttribute('title', label);
      b.innerHTML = svg;
      b.addEventListener('click', onClick);
      return b;
    }

    loadUsers();
  </script>
</body>
</html>
