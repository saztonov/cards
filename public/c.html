<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Визитка · СУ-10</title>
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <main class="page" style="justify-content: center;">
    <article class="pcard" id="pcard" hidden>
      <div class="pcard__brandbar"><img src="/img/logo-su10.jpg" alt="СУ-10 — Генеральный подрядчик"></div>
      <div class="pcard__banner"></div>
      <div class="pcard__body">
        <img class="pcard__avatar" id="pAvatar" alt="">
        <h1 class="pcard__name" id="pName"></h1>
        <p class="pcard__role" id="pRole"></p>

        <div class="stack" style="text-align:left;">
          <a class="pcard__field" id="fPhone" href="#" hidden><span class="muted">📞</span><span></span></a>
          <a class="pcard__field" id="fEmail" href="#" hidden><span class="muted">✉️</span><span></span></a>
          <a class="pcard__field" id="fTg" href="#" target="_blank" rel="noopener" hidden><span class="muted"><svg viewBox="0 0 24 24" width="20" height="20" fill="#26A5E4" aria-hidden="true"><path d="M9.78 18.65l.28-4.23 7.68-6.92c.34-.31-.07-.46-.52-.19L7.74 13.3 3.64 12c-.88-.25-.89-.86.2-1.3l15.97-6.16c.73-.33 1.43.18 1.15 1.3l-2.72 12.81c-.19.91-.74 1.13-1.5.71L12.6 16.3l-1.99 1.93c-.23.23-.42.42-.83.42z"/></svg></span><span></span></a>
          <div class="pcard__field" id="fAbout" hidden><span class="muted">ℹ️</span><span></span></div>
        </div>

        <div style="height: 1rem;"></div>
        <a id="vcardLink" class="btn btn--primary btn--block" download="contact.vcf">Сохранить контакт</a>
        <img id="qr" class="pcard__qr" alt="QR-ссылка на визитку" style="margin-top:1rem;">
        <button id="shareBtn" class="btn btn--ghost btn--block" type="button" hidden style="margin-top:1rem;">Отправить контакт</button>
      </div>
    </article>

    <p id="notFound" class="muted" hidden>Визитка не найдена.</p>
  </main>

  <script src="/js/vendor/qrcode.min.js"></script>
  <script type="module">
    import { apiJson } from '/js/api.js';
    import { setText, setAttr, $ } from '/js/lib/escape.js';

    const slug = new URLSearchParams(location.search).get('slug');
    if (!slug) { $('#notFound').hidden = false; throw new Error('no_slug'); }

    try {
      const c = await apiJson(`/api/v1/cards/${encodeURIComponent(slug)}`);
      const card = $('#pcard');
      card.hidden = false;
      if (c.show_photo === false) {
        card.classList.add('pcard--no-photo');
        card.querySelector('.pcard__banner').append($('#pName'), $('#pRole'));
      } else {
        setAttr($('#pAvatar'), 'src', c.avatar_path || '');
      }
      setText($('#pName'), c.full_name);
      setText($('#pRole'), c.position || '');

      const show = (id, value, href) => {
        if (!value) return;
        const el = $(id);
        el.hidden = false;
        el.querySelector('span:last-child').textContent = value;
        if (href) setAttr(el, 'href', href);
      };
      show('#fPhone', c.phone, c.phone && `tel:${c.phone.replace(/[^\d+]/g, '')}`);
      show('#fEmail', c.email, c.email && `mailto:${c.email}`);
      const tgNick = c.telegram ? c.telegram.replace(/^@/, '') : '';
      show('#fTg', tgNick && `@${tgNick}`, tgNick && `https://t.me/${tgNick}`);
      show('#fAbout', c.about);

      const lines = [
        'BEGIN:VCARD', 'VERSION:3.0',
        `FN:${c.full_name || ''}`,
        `ORG:Группа компаний СУ-10`,
        c.position ? `TITLE:${c.position}` : '',
        c.phone ? `TEL;TYPE=WORK,VOICE:${c.phone}` : '',
        c.email ? `EMAIL;TYPE=PREF,INTERNET:${c.email}` : '',
        'END:VCARD',
      ].filter(Boolean).join('\n');
      setAttr($('#vcardLink'), 'href', `data:text/vcard;charset=utf-8,${encodeURIComponent(lines)}`);

      const url = `${location.origin}/c.html?slug=${encodeURIComponent(slug)}`;
      const qr = qrcode(0, 'M');
      qr.addData(url);
      qr.make();
      setAttr($('#qr'), 'src', qr.createDataURL(8, 4));

      const shareText = `${c.full_name}${c.position ? ' — ' + c.position : ''}`;
      const shareData = { title: c.full_name, text: shareText, url };
      const btn = $('#shareBtn');
      const canShare = typeof navigator.share === 'function';
      const canCopy = !!(navigator.clipboard && navigator.clipboard.writeText);
      if (canShare || canCopy) {
        btn.hidden = false;
        btn.addEventListener('click', async () => {
          try {
            if (canShare) {
              await navigator.share(shareData);
            } else {
              await navigator.clipboard.writeText(`${shareText}\n${url}`);
              setText(btn, 'Скопировано ✓');
              btn.disabled = true;
              setTimeout(() => { setText(btn, 'Отправить контакт'); btn.disabled = false; }, 1500);
            }
          } catch (err) {
            if (err.name !== 'AbortError') console.error(err);
          }
        });
      }
    } catch (err) {
      if (err.status === 404) $('#notFound').hidden = false;
      else console.error(err);
    }
  </script>
</body>
</html>
